<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/misfiticon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Misfit - Is your word match or misfit?</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Misfit" />
    <meta property="og:title" content="Misfit - Is your word match or misfit?" />
    <meta
      property="og:description"
      content="Play Misfit and find out if your word is a match or the odd one out."
    />
    <meta property="og:image" content="/misfitlogo.png" />
    <meta
      property="og:image:alt"
      content="Misfit logo and game branding"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Misfit - Is your word match or misfit?" />
    <meta
      name="twitter:description"
      content="Play Misfit and find out if your word is a match or the odd one out."
    />
    <meta name="twitter:image" content="/misfitlogo.png" />
    <script>
      (function () {
        if (!window.opener || !window.location.hash) return;

        const params = new URLSearchParams(window.location.hash.slice(1));
        const accessToken = params.get("access_token");
        const state = params.get("state");
        const error = params.get("error");

        if (!accessToken && !error) return;

        try {
          window.opener.postMessage(
            {
              type: "itch-oauth-success",
              accessToken,
              state,
              error,
            },
            window.location.origin,
          );
        } finally {
          window.close();
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
